site_name: LLM Learner — 研究者知识库
site_description: 帮你快速建立新领域的可靠知识结构
docs_dir: docs
site_dir: _site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  font:
    text: Noto Sans SC
    code: JetBrains Mono

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: zh

exclude_docs: |
  _template/
  _site/
  .cursor/
  node_modules/
  *.sh
  *.bib
  .gitignore

